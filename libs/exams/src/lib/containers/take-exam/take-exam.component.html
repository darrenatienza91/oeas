<div class="m-3">
  <nz-page-header
    (nzBack)="onBack()"
    [nzBackIcon]="takeExamView() === TakeExamViewEnum.instructionView ? '' : null"
    nzTitle="{{ examDetail()?.name }}"
    ><nz-page-header-extra>
      <div class="recording-timer-container">
        @if (takeExamView() === TakeExamViewEnum.takeExamQuestionView) {
          @if (this.isScreenRecording()) {
            <p class="recording">Recording</p>
          }
          <p>{{ examinationDurationRemaining() }}</p>
        }
      </div>
    </nz-page-header-extra></nz-page-header
  >
  <batstateu-exam-instruction-view
    [examDetail]="examDetail()"
    [hidden]="takeExamView() !== TakeExamViewEnum.instructionView"
  ></batstateu-exam-instruction-view>

  @if (takeExamView() === TakeExamViewEnum.takeExamQuestionView) {
    <batstateu-take-exam-question-view
      [videoVisible]="videoVisible()"
      [currentQuestion]="currentQuestion()"
      (save)="onSubmitAnswer($event)"
    ></batstateu-take-exam-question-view>

    @if (appConfig.allowRecording) {
      <batstateu-take-exam-screen-recording
        #takeExamScreenRecorder
        (startExam)="onStartExam()"
      ></batstateu-take-exam-screen-recording>
    }
  }

  <batstateu-take-exam-control
    [takeExamControlState]="takeExamControlState"
    [takeExamState]="takeExamView()"
    [isStartExam]="isStartExam"
    [enableNextButton]="enableNextButton"
    [enablePreviousButton]="enablePreviousButton"
    (startRecord)="onStartRecord()"
    (nextQuestion)="onNextQuestion()"
    (prevQuestion)="onPreviousQuestion()"
    (finishExam)="onFinishExamination()"
  ></batstateu-take-exam-control>
</div>
