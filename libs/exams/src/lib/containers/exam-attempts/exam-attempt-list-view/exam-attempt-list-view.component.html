<div class="m-3">
  <nz-page-header class="site-page-header" nzTitle="Takers">
    <nz-breadcrumb nz-page-header-breadcrumb>
      <nz-breadcrumb-item>Exams</nz-breadcrumb-item>
      <nz-breadcrumb-item>Takers</nz-breadcrumb-item>
    </nz-breadcrumb>
    <nz-page-header-extra>
      <nz-input-wrapper>
        <nz-icon nzInputSuffix nzType="search" />
        <input nz-input type="text" placeholder="Search" [(ngModel)]="searchText" />
      </nz-input-wrapper>
    </nz-page-header-extra>
  </nz-page-header>

  <nz-table #basicTable [nzData]="examAttemptList()" nzBordered>
    <thead>
      <tr>
        <th scope="col" nzWidth="24px"></th>
        <th scope="col">Name</th>
        <th scope="col">Department</th>
        <th scope="col">Section</th>
        <th scope="col">Score</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (data of basicTable.data; track data; let i = $index) {
        <tr>
          <td>
            <div class="index-cell">
              <span>{{ i + 1 }}</span>
              @if (!data?.hasRecording) {
                <i
                  nz-icon
                  nz-tooltip
                  nzTooltipTitle="It has history of tab inactivity"
                  nzType="exclamation-circle"
                  nzTheme="fill"
                  class="warning-icon"
                ></i>
              }
            </div>
          </td>

          <td>{{ data?.fullName }}</td>
          <td>{{ data?.department }}</td>
          <td>{{ data?.section }}</td>
          <td>{{ data?.finalScore }}</td>

          <td>
            <a
              nz-button
              nzType="text"
              nz-tooltip
              nzTooltipTitle="Open Result"
              [routerLink]="[data?.id, 'results']"
            >
              <i nz-icon nzType="folder-open" nzTheme="twotone" nzTwotoneColor="#faad14"></i>
            </a>

            @if (data?.hasRecording) {
              <a
                nz-button
                nzType="text"
                nz-tooltip
                nzTooltipTitle="Play Recording"
                [routerLink]="[data?.id, 'recording']"
              >
                <i nz-icon nzType="play-square" nzTheme="twotone" nzTwotoneColor="#f5222d"></i>
              </a>
            }
          </td>
        </tr>
      }
    </tbody>
  </nz-table>
</div>
