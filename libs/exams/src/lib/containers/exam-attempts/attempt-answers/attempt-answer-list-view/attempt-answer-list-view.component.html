<div class="m-3">
  <nz-page-header nzTitle="Results">
    <nz-breadcrumb nz-page-header-breadcrumb>
      <nz-breadcrumb-item>Exams</nz-breadcrumb-item>
      <nz-breadcrumb-item>Attempts</nz-breadcrumb-item>
      <nz-breadcrumb-item>Results</nz-breadcrumb-item>
    </nz-breadcrumb>

    <nz-page-header-extra>
      <nz-input-group style="width: 240px" [nzSuffix]="suffixIconSearch">
        <input type="text" nz-input placeholder="Search" [(ngModel)]="searchText" />
      </nz-input-group>

      <ng-template #suffixIconSearch>
        <i nz-icon nzType="search"></i>
      </ng-template>
    </nz-page-header-extra>
  </nz-page-header>

  <nz-table #basicTable [nzData]="examAttemptResultList()" nzBordered>
    <thead>
      <tr>
        <th scope="col">Question</th>
        <th scope="col">Points</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>

    <tbody>
      @for (data of basicTable.data; track data) {
        <tr>
          <td>
            <div [innerHTML]="data?.question"></div>
          </td>

          <td>{{ data?.score }}</td>

          <td>
            @if (data?.score === 0) {
              <a nz-button nzType="text" nz-tooltip nzTooltipTitle="Edit" [routerLink]="[data?.id]">
                <i nz-icon nzType="edit" nzTheme="twotone" nzTwotoneColor="#faad14"></i>
              </a>
            }

            <nz-dropdown-menu #menu="nzDropdownMenu">
              <ul nz-menu>
                <li nz-menu-item>
                  <a style="color: #8c8c8c" [routerLink]="[data?.id, 'attempts']">
                    View Attempts
                  </a>
                </li>
              </ul>
            </nz-dropdown-menu>
          </td>
        </tr>
      }
    </tbody>
  </nz-table>
</div>
