<div class="container">
  <nz-page-header class="site-page-header">
    <nz-breadcrumb nz-page-header-breadcrumb>
      <nz-breadcrumb-item>Setting</nz-breadcrumb-item>
      <nz-breadcrumb-item>Users</nz-breadcrumb-item>
      <nz-breadcrumb-item>Edit</nz-breadcrumb-item>
    </nz-breadcrumb>
  </nz-page-header>
  <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()" [nzLayout]="'vertical'">
    <div nz-row [nzGutter]="24">
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="userName">User Name</nz-form-label>
          <nz-form-control nzErrorTip="The input is not valid code!">
            <input nz-input formControlName="userName" id="userName" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="firstname">First Name</nz-form-label>
          <nz-form-control nzErrorTip="The input is not valid firstname!">
            <input nz-input formControlName="firstname" id="firstname" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="middlename">Middle Name</nz-form-label>
          <nz-form-control nzErrorTip="The input is not valid middlename!">
            <input nz-input formControlName="middlename" id="middlename" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="lastname">Last Name</nz-form-label>
          <nz-form-control nzErrorTip="The input is not valid lastname!">
            <input nz-input formControlName="lastname" id="lastname" />
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzFor="department" nzRequired>Department</nz-form-label>
          <nz-form-control nzErrorTip="Please input department!">
            <nz-select
              id="department"
              formControlName="departmentId"
              nzPlaceHolder="Select department"
            >
              @for (data of departments(); track data?.id) {
                <nz-option [nzValue]="data.id" [nzLabel]="data.name"></nz-option>
              }
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="12">
        <nz-form-item>
          <nz-form-label nzFor="section" nzRequired>Section</nz-form-label>
          <nz-form-control nzErrorTip="Please input section!">
            <nz-select id="section" formControlName="sectionId" nzPlaceHolder="Select section">
              @for (data of sections(); track data?.id) {
                <nz-option [nzValue]="data.id" [nzLabel]="data.name"></nz-option>
              }
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
      <div nz-col [nzSpan]="24">
        <nz-form-item
          class="register-area"
          style="
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
          "
        >
          <nz-space>
            <a
              *nzSpaceItem
              nz-button
              style="width: 78px"
              nzType="default"
              routerLink="/setting/users"
              >Cancel</a
            >
            <button *nzSpaceItem nz-button nzType="primary">Save</button>
          </nz-space>
        </nz-form-item>
      </div>
    </div>
  </form>
</div>
