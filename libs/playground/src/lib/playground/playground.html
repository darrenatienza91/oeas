<div class="container">
  <div>
    <video #recorder class="video-js vjs-recording"></video>
    <div>
      <button (click)="screenRecorderFacade.start()" [disabled]="!screenRecorderFacade.isReady()">
        Start
      </button>
      <button
        (click)="screenRecorderFacade.pause()"
        [disabled]="!screenRecorderFacade.isRecording()"
      >
        Pause
      </button>
      <button
        (click)="screenRecorderFacade.resume()"
        [disabled]="screenRecorderFacade.state() !== 'pause'"
      >
        Resume
      </button>
      <button
        (click)="screenRecorderFacade.stop()"
        [disabled]="!screenRecorderFacade.isRecording()"
      >
        Stop
      </button>

      <p>State: {{ screenRecorderFacade.state() }}</p>
    </div>
  </div>
  <div>
    <video #camera class="video-js vjs-recording"></video>
    <div>
      <button (click)="cameraRecorderFacade.start()" [disabled]="!cameraRecorderFacade.isReady()">
        Start
      </button>

      <button
        (click)="cameraRecorderFacade.stop()"
        [disabled]="!cameraRecorderFacade.isRecording()"
      >
        Stop
      </button>

      <p>State: {{ cameraRecorderFacade.state() }}</p>
    </div>
  </div>
</div>
