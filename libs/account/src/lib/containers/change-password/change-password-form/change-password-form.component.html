<div class="m-3">
  <nz-page-header class="site-page-header" nzTitle="Change Password"> </nz-page-header>
  <nz-card
    ><form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()" [nzLayout]="'vertical'">
      <div nz-row [nzGutter]="24">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="currentPassword" nzRequired>Old Password</nz-form-label>
            <nz-form-control nzErrorTip="Please input your old password!">
              <input
                nz-input
                type="password"
                id="currentPassword"
                formControlName="currentPassword"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="newPassword" nzRequired>New Password</nz-form-label>
            <nz-form-control nzErrorTip="Please input your new password!">
              <input
                nz-input
                type="password"
                id="newPassword"
                formControlName="newPassword"
                (ngModelChange)="updateConfirmValidator()"
              />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzFor="checkPassword" nzRequired>Retype Password</nz-form-label>
            <nz-form-control [nzErrorTip]="errorTpl">
              <input nz-input type="password" formControlName="checkPassword" id="checkPassword" />
              <ng-template #errorTpl let-control>
                @if (control.hasError('required')) {
                  <ng-container>Please confirm your new password!</ng-container>
                }
                @if (control.hasError('confirm')) {}
                <ng-container> Two passwords that you enter is inconsistent! </ng-container>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item
            nz-row
            class="register-area"
            style="display: flex; flex-direction: row; justify-content: flex-end; margin-top: 30px"
          >
            <nz-space>
              <a *nzSpaceItem nz-button routerLink="/dashboard">Cancel</a>
              <button *nzSpaceItem nz-button nzType="primary">Update</button>
            </nz-space>
          </nz-form-item>
        </div>
      </div>
    </form>
  </nz-card>
</div>
