<nz-page-header class="site-page-header" nzTitle="Profile"> </nz-page-header>
<form nz-form [formGroup]="form" (ngSubmit)="submitForm()" [nzLayout]="'vertical'">
  <div nz-row [nzGutter]="24">
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzRequired nzFor="userName">User Name</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="userName" id="code" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="firstName" nzRequired>
          <span>First Name</span>
        </nz-form-label>
        <nz-form-control nzErrorTip="Please input your firstName!">
          <input nz-input id="firstName" formControlName="firstName" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="middleName">
          <span>Middle Name</span>
        </nz-form-label>
        <nz-form-control nzErrorTip="Please input your middleName!">
          <input nz-input id="middleName" formControlName="middleName" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="lastName" nzRequired>
          <span>Last Name</span>
        </nz-form-label>
        <nz-form-control nzErrorTip="Please input your lastName!">
          <input nz-input id="lastName" formControlName="lastName" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="contactNumber" nzRequired>Contact Number</nz-form-label>
        <nz-form-control nzErrorTip="Please input your phone number!">
          <nz-space-compact>
            <nz-input-wrapper>
              <span nzInputAddonBefore>+63</span>
              <input formControlName="contactNumber" id="'contactNumber'" nz-input />
            </nz-input-wrapper>
          </nz-space-compact>
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="address" nzRequired>
          <span>Address</span>
        </nz-form-label>
        <nz-form-control nzErrorTip="Please input your address!">
          <input nz-input id="address" formControlName="address" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <!-- <div nz-col [nzSpan]="12">
      <nz-form-item>
        <nz-form-label nzFor="departmentId" nzRequired>Department</nz-form-label>
        <nz-form-control nzErrorTip="Please input departmentId!">
          <nz-select
            id="departmentId"
            formControlName="departmentId"
            nzPlaceHolder="Select departmentId"
          >
            <nz-option [nzValue]="1" nzLabel="Grad School"></nz-option>

          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div> -->

      <nz-form-item>
        <nz-form-label nzFor="sectionId" nzRequired>Section</nz-form-label>
        <nz-form-control nzErrorTip="Please input departmentId!">
          <nz-select id="sectionId" formControlName="sectionId" nzPlaceHolder="Select sectionId">
            <nz-option [nzValue]="1" nzLabel="Grad-1101"></nz-option>
            <nz-option [nzValue]="2" nzLabel="Grad-1102"></nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div> -->
    <div nz-col [nzSpan]="24" style="display: flex; justify-content: flex-end">
      <nz-space>
        <a nz-button *nzSpaceItem nzType="default" routerLink="/dashboard">Cancel</a>
        <button *nzSpaceItem nz-button nzType="primary">Save</button>
      </nz-space>
    </div>
  </div>
</form>
